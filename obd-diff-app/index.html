<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="icon.png">
<title>ODB++ Layer Differ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #1a1a1a url("icon.png") center/cover no-repeat fixed;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: #1a1a1a;
    opacity: 0.88;
    pointer-events: none;
    z-index: 0;
  }

  body > * {
    position: relative;
    z-index: 1;
  }

  /* ── Input phase ─────────────────────────────────────────────────────── */
  #input-phase {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 2rem;
  }

  #input-phase h1 {
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .drop-row {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .drop-zone {
    width: 280px;
    height: 160px;
    border: 2px dashed #555;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    padding: 1rem;
    text-align: center;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: #4a9eff;
    background: rgba(74, 158, 255, 0.06);
  }

  .drop-zone.has-file {
    border-color: #4caf50;
    background: rgba(76, 175, 80, 0.06);
  }

  .drop-zone .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
  }

  .drop-zone .icon {
    font-size: 2rem;
  }

  .drop-zone .filename {
    font-size: 0.85rem;
    color: #aaa;
    word-break: break-all;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #compare-btn {
    padding: 0.65rem 2.2rem;
    font-size: 1rem;
    font-weight: 600;
    background: #4a9eff;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }

  #compare-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  #compare-btn:not(:disabled):hover { background: #3a8eef; }

  #status-msg {
    font-size: 0.9rem;
    color: #aaa;
    min-height: 1.2em;
    text-align: center;
  }

  #status-msg.error { color: #ff6b6b; }

  /* ── Results phase ───────────────────────────────────────────────────── */
  #results-phase {
    display: none;
    flex: 1;
    flex-direction: column;
    min-height: 0;
  }

  #results-phase.visible { display: flex; }

  #results-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.6rem 1rem;
    background: #222;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
  }

  #back-btn {
    background: none;
    border: 1px solid #555;
    color: #ccc;
    padding: 0.3rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    white-space: nowrap;
    transition: border-color 0.15s;
  }

  #back-btn:hover { border-color: #aaa; }

  #file-labels {
    flex: 1;
    text-align: center;
    font-size: 0.85rem;
    color: #aaa;
  }

  #file-labels span { color: #e0e0e0; }

  #results-body {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── Layer panel ─────────────────────────────────────────────────────── */
  #layer-panel {
    width: 190px;
    flex-shrink: 0;
    background: #1e1e1e;
    border-right: 1px solid #333;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #layer-panel-header {
    padding: 0.5rem 0.75rem;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #666;
    display: flex;
    gap: 0.5rem;
    align-items: center;
    border-bottom: 1px solid #2a2a2a;
  }

  .sel-btn {
    background: none;
    border: 1px solid #444;
    color: #aaa;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.72rem;
    transition: border-color 0.1s;
  }

  .sel-btn:hover { border-color: #888; }

  #layer-list {
    overflow-y: auto;
    flex: 1;
    padding: 0.4rem 0;
  }

  .layer-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.3rem 0.75rem;
    cursor: pointer;
    transition: background 0.1s;
    font-size: 0.85rem;
    user-select: none;
  }

  .layer-item:hover { background: #2a2a2a; }
  .layer-item input[type=checkbox] { accent-color: #4a9eff; cursor: pointer; }

  /* ── SVG viewer ──────────────────────────────────────────────────────── */
  #svg-viewer {
    flex: 1;
    background: #111;
    overflow: hidden;
    position: relative;
    cursor: grab;
  }

  #svg-viewer.dragging { cursor: grabbing; }

  #svg-stack {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    background: white;
    line-height: 0;
  }

  #svg-stack img {
    position: absolute;
    top: 0; left: 0;
    mix-blend-mode: multiply;
    display: block;
  }

  #viewer-hint {
    position: absolute;
    bottom: 0.75rem;
    right: 0.75rem;
    font-size: 0.72rem;
    color: #555;
    pointer-events: none;
  }

  #no-layers-msg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<!-- ── Input phase ──────────────────────────────────────────────────────────── -->
<div id="input-phase">
  <h1>ODB++ Layer Differ</h1>

  <div class="drop-row">
    <div class="drop-zone" id="drop-ref" tabindex="0" role="button" aria-label="Reference ZIP">
      <span class="label">Reference</span>
      <span class="icon">📂</span>
      <span class="filename" id="ref-name">Drop .zip or click to browse</span>
      <input type="file" id="file-ref" accept=".zip" style="display:none">
    </div>

    <div class="drop-zone" id="drop-rev" tabindex="0" role="button" aria-label="Revised ZIP">
      <span class="label">Revised</span>
      <span class="icon">📂</span>
      <span class="filename" id="rev-name">Drop .zip or click to browse</span>
      <input type="file" id="file-rev" accept=".zip" style="display:none">
    </div>
  </div>

  <button id="compare-btn" disabled>Compare</button>
  <div id="status-msg"></div>
</div>

<!-- ── Results phase ─────────────────────────────────────────────────────────── -->
<div id="results-phase">
  <div id="results-header">
    <button id="back-btn">&#8592; New Comparison</button>
    <div id="file-labels">
      Reference: <span id="lbl-ref"></span> &nbsp;/&nbsp; Revised: <span id="lbl-rev"></span>
    </div>
  </div>

  <div id="results-body">
    <div id="layer-panel">
      <div id="layer-panel-header">
        Layers
        <button class="sel-btn" id="sel-all">All</button>
        <button class="sel-btn" id="sel-none">None</button>
      </div>
      <div id="layer-list"></div>
    </div>

    <div id="svg-viewer">
      <div id="svg-stack"></div>
      <div id="no-layers-msg">Select a layer to view</div>
      <div id="viewer-hint">scroll: zoom &nbsp; drag: pan &nbsp; double-click: fit</div>
    </div>
  </div>
</div>

<!-- JSZip is required by diff.js for zip extraction in the browser -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="diff.js"></script>
<script>
(function () {
  'use strict';

  // ── State ─────────────────────────────────────────────────────────────────
  let refFile = null, revFile = null;
  // currentSession: { ref_name, rev_name, layers: string[], svgMap: Map<string,string> }
  let currentSession = null;
  let selectedLayers = new Set();

  // Zoom/pan state
  let scale = 1, panX = 0, panY = 0;
  let dragging = false, dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;

  // ── Element refs ──────────────────────────────────────────────────────────
  const inputPhase   = document.getElementById('input-phase');
  const resultsPhase = document.getElementById('results-phase');
  const dropRef      = document.getElementById('drop-ref');
  const dropRev      = document.getElementById('drop-rev');
  const fileRef      = document.getElementById('file-ref');
  const fileRev      = document.getElementById('file-rev');
  const refNameEl    = document.getElementById('ref-name');
  const revNameEl    = document.getElementById('rev-name');
  const compareBtn   = document.getElementById('compare-btn');
  const statusMsg    = document.getElementById('status-msg');
  const backBtn      = document.getElementById('back-btn');
  const lblRef       = document.getElementById('lbl-ref');
  const lblRev       = document.getElementById('lbl-rev');
  const layerList    = document.getElementById('layer-list');
  const selAll       = document.getElementById('sel-all');
  const selNone      = document.getElementById('sel-none');
  const svgViewer    = document.getElementById('svg-viewer');
  const svgStack     = document.getElementById('svg-stack');
  const noLayersMsg  = document.getElementById('no-layers-msg');

  // ── Drop zone helpers ─────────────────────────────────────────────────────
  function setupDropZone(zone, fileInput, nameEl, slot) {
    zone.addEventListener('click', () => fileInput.click());
    zone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0], zone, nameEl, slot);
    });

    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('dragover');
      const f = e.dataTransfer.files[0];
      if (f) setFile(f, zone, nameEl, slot);
    });
  }

  function setFile(file, zone, nameEl, slot) {
    if (slot === 'ref') refFile = file; else revFile = file;
    nameEl.textContent = file.name;
    zone.classList.add('has-file');
    compareBtn.disabled = !(refFile && revFile);
    setStatus('');
  }

  setupDropZone(dropRef, fileRef, refNameEl, 'ref');
  setupDropZone(dropRev, fileRev, revNameEl, 'rev');

  // ── Compare ───────────────────────────────────────────────────────────────
  compareBtn.addEventListener('click', async () => {
    if (!refFile || !revFile) return;
    compareBtn.disabled = true;
    setStatus('Comparing layers\u2026');

    try {
      const result = await ODBDiff.compareArchives(refFile, revFile, msg => setStatus(msg));

      if (!result.layers || result.layers.length === 0) {
        setStatus('No common layers found between the two archives.', true);
        compareBtn.disabled = false;
        return;
      }

      showResults(result);
    } catch (err) {
      setStatus('Error: ' + err.message, true);
      compareBtn.disabled = false;
    }
  });

  function setStatus(msg, isError) {
    statusMsg.textContent = msg;
    statusMsg.className = isError ? 'error' : '';
  }

  // ── Results ───────────────────────────────────────────────────────────────
  function showResults(result) {
    // Normalise the result from compareArchives into the shape the UI expects.
    currentSession = {
      ref_name: result.refName,
      rev_name: result.revName,
      layers:   result.layers.map(l => l.name),
      svgMap:   new Map(result.layers.map(l => [l.name, l.svg])),
    };
    selectedLayers = new Set();

    lblRef.textContent = currentSession.ref_name;
    lblRev.textContent = currentSession.rev_name;

    // Build layer checkboxes
    layerList.innerHTML = '';
    currentSession.layers.forEach(name => {
      const item = document.createElement('label');
      item.className = 'layer-item';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = name;
      cb.addEventListener('change', () => {
        if (cb.checked) selectedLayers.add(name); else selectedLayers.delete(name);
        renderStack();
      });

      item.appendChild(cb);
      item.appendChild(document.createTextNode(name));
      layerList.appendChild(item);
    });

    inputPhase.style.display = 'none';
    resultsPhase.classList.add('visible');

    // Auto-select first layer
    const firstCb = layerList.querySelector('input[type=checkbox]');
    if (firstCb) {
      firstCb.checked = true;
      selectedLayers.add(firstCb.value);
      renderStack();
    }
  }

  backBtn.addEventListener('click', () => {
    resultsPhase.classList.remove('visible');
    inputPhase.style.display = '';
    compareBtn.disabled = !(refFile && revFile);
    setStatus('');
    currentSession = null;
    selectedLayers = new Set();
    // Revoke all blob URLs to free memory before clearing the DOM
    svgStack.querySelectorAll('img').forEach(releaseImg);
    svgStack.innerHTML = '';
    svgStack.style.width = '';
    svgStack.style.height = '';
    noLayersMsg.style.display = '';
  });

  selAll.addEventListener('click', () => {
    layerList.querySelectorAll('input[type=checkbox]').forEach(cb => {
      cb.checked = true;
      selectedLayers.add(cb.value);
    });
    renderStack();
  });

  selNone.addEventListener('click', () => {
    layerList.querySelectorAll('input[type=checkbox]').forEach(cb => {
      cb.checked = false;
    });
    selectedLayers.clear();
    renderStack();
  });

  // ── SVG stack rendering ───────────────────────────────────────────────────

  // Each <img> in the stack gets a blob: URL stored in dataset.blobUrl so we
  // can revoke it when the image is removed, avoiding memory leaks.

  function releaseImg(img) {
    if (img.dataset.blobUrl) {
      URL.revokeObjectURL(img.dataset.blobUrl);
    }
    img.remove();
  }

  function renderStack() {
    if (!currentSession) return;
    const layers = currentSession.layers.filter(n => selectedLayers.has(n));

    // Remove images that are no longer selected
    svgStack.querySelectorAll('img').forEach(img => {
      if (!layers.includes(img.dataset.layer)) releaseImg(img);
    });

    noLayersMsg.style.display = layers.length === 0 ? '' : 'none';

    if (layers.length === 0) {
      svgStack.style.width  = '0';
      svgStack.style.height = '0';
      return;
    }

    let pendingLoads = 0;

    layers.forEach(name => {
      let img = svgStack.querySelector(`img[data-layer="${CSS.escape(name)}"]`);
      if (!img) {
        // Create a blob URL from the in-memory SVG string and use it as the
        // image source.  This avoids any server round-trip and works from
        // file:// as well as any HTTP origin.
        const svgStr = currentSession.svgMap.get(name);
        const url = URL.createObjectURL(new Blob([svgStr], { type: 'image/svg+xml' }));

        img = document.createElement('img');
        img.dataset.layer   = name;
        img.dataset.blobUrl = url;
        img.src = url;
        svgStack.appendChild(img);
        pendingLoads++;

        img.addEventListener('load', () => {
          // Size the stack to the first image (all layers share the same
          // dimensions because they use a common global bounding box).
          if (!svgStack.style.width) {
            svgStack.style.width  = img.naturalWidth  + 'px';
            svgStack.style.height = img.naturalHeight + 'px';
          }
          pendingLoads--;
          if (pendingLoads === 0) resetView();
        }, { once: true });
      }
    });

    // All images were already cached — reset view immediately.
    if (pendingLoads === 0) resetView();
  }

  // ── Zoom / pan ────────────────────────────────────────────────────────────
  const ZOOM_FACTOR = 1.15;

  function applyTransform() {
    svgStack.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  }

  function resetView() {
    const vw = svgViewer.clientWidth;
    const vh = svgViewer.clientHeight;
    const sw = parseInt(svgStack.style.width)  || svgStack.offsetWidth;
    const sh = parseInt(svgStack.style.height) || svgStack.offsetHeight;
    if (!sw || !sh) return;
    scale = Math.min(vw / sw, vh / sh) * 0.95;
    panX  = (vw - sw * scale) / 2;
    panY  = (vh - sh * scale) / 2;
    applyTransform();
  }

  svgViewer.addEventListener('wheel', e => {
    e.preventDefault();
    const rect   = svgViewer.getBoundingClientRect();
    const cx     = e.clientX - rect.left;
    const cy     = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? ZOOM_FACTOR : 1 / ZOOM_FACTOR;
    panX   = cx - (cx - panX) * factor;
    panY   = cy - (cy - panY) * factor;
    scale *= factor;
    applyTransform();
  }, { passive: false });

  svgViewer.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragging   = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    panStartX  = panX;
    panStartY  = panY;
    svgViewer.classList.add('dragging');
  });

  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    panX = panStartX + (e.clientX - dragStartX);
    panY = panStartY + (e.clientY - dragStartY);
    applyTransform();
  });

  window.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; svgViewer.classList.remove('dragging'); }
  });

  svgViewer.addEventListener('dblclick', resetView);

  window.addEventListener('resize', () => { if (currentSession) resetView(); });
})();
</script>
</body>
</html>
